# Stop radio
bindsym $mod+F1 exec --no-startup-id ~/.config/i3/scripts/music.sh stop, mode "default"

# Show last notification
bindsym $mod+n exec dunstctl history-pop

# Screenshot
bindsym Print exec flameshot gui

# Volume up
bindsym XF86AudioRaiseVolume exec --no-startup-id ~/.config/i3/scripts/volume.sh "set-sink-volume @DEFAULT_SINK@ +10%"
# Volume down
bindsym XF86AudioLowerVolume exec --no-startup-id ~/.config/i3/scripts/volume.sh "set-sink-volume @DEFAULT_SINK@ -10%"
# Toggle mute
bindsym XF86AudioMute exec --no-startup-id ~/.config/i3/scripts/volume.sh "set-sink-mute @DEFAULT_SINK@ toggle"
# Toggle mic mute
bindsym XF86AudioMicMute exec --no-startup-id "pactl set-source-mute @DEFAULT_SOURCE@ toggle && pkill -SIGRTMIN+3 i3blocks"

exec --no-startup-id dunst
# Brightness up
bindsym XF86MonBrightnessUp exec --no-startup-id ~/.config/i3/scripts/brightness.sh +10%
# Brightness down
bindsym XF86MonBrightnessDown exec --no-startup-id ~/.config/i3/scripts/brightness.sh 10%-


# Open terminal
bindsym $mod+Return exec i3-sensible-terminal

# Open browser (work)
bindsym $mod+b exec "/home/guillaume/.local/sources/firefox/firefox -p kuartz"

# Open browser (personal)
bindsym Pause exec "/home/guillaume/.local/sources/firefox/firefox -p perso"

# Toggle VPN
bindsym $mod+Menu exec --no-startup-id ~/.config/i3/scripts/wg-home-toggle.sh

# Toggle dark/light mode
bindsym $mod+F12 exec --no-startup-id ~/.config/i3/scripts/dark-mode-toggle.sh

# Kill focused window
bindsym $mod+Shift+A kill
# Kill focused window
bindsym Mod1+F4 kill

# Focus left
focus_follows_mouse no
# Focus left
bindsym $mod+j focus left
# Keybindings cheat sheet
bindsym $mod+k exec --no-startup-id ~/.config/i3/scripts/keybindings-cheatsheet.sh
# Focus up
bindsym $mod+l focus up
# Focus right
bindsym $mod+m focus right

# Focus left
bindsym $mod+Left focus left
# Focus down
bindsym $mod+Down focus down
# Focus up
bindsym $mod+Up focus up
# Focus right
bindsym $mod+Right focus right

# Move window left
bindsym $mod+Shift+j move left
# Move window down
bindsym $mod+Shift+k move down
# Move window up
bindsym $mod+Shift+l move up
# Move window right
bindsym $mod+Shift+M move right

# Move window left
bindsym $mod+Shift+Left move left
# Move window down
bindsym $mod+Shift+Down move down
# Move window up
bindsym $mod+Shift+Up move up
# Move window right
bindsym $mod+Shift+Right move right

# Split horizontal
bindsym $mod+h split h

# Split vertical
bindsym $mod+v split v

# Toggle fullscreen
bindsym $mod+f fullscreen toggle


# Layout: stacking
bindsym $mod+s layout stacking
# Layout: tabbed
bindsym $mod+z layout tabbed
# Layout: toggle split
bindsym $mod+e layout toggle split

# Toggle floating
bindsym $mod+Shift+space floating toggle
# Toggle tiling/floating
bindsym $mod+t floating toggle

# Toggle gaps
bindsym $mod+Shift+g gaps inner current toggle 6px, gaps outer current toggle 12px

# change focus between tiling / floating windows
# bindsym $mod+space focus mode_toggle

# Focus parent container
bindsym $mod+q focus parent

# focus the child container
#bindsym $mod+d focus child

set $ws1 "1"
set $ws2 "2"
set $ws3 "3"
set $ws4 "4"
set $ws5 "5"
set $ws6 "6"
set $ws7 "7"
set $ws8 "8"
set $ws9 "9"
set $ws10 "10"

# Switch to workspace 1
bindsym $mod+ampersand workspace number $ws1
# Switch to workspace 2
bindsym $mod+eacute workspace number $ws2
# Switch to workspace 3
bindsym $mod+quotedbl workspace number $ws3
# Switch to workspace 4
bindsym $mod+apostrophe workspace number $ws4
# Switch to workspace 5
bindsym $mod+parenleft workspace number $ws5
# Switch to workspace 6
bindsym $mod+minus workspace number $ws6
# Switch to workspace 7
bindsym $mod+egrave workspace number $ws7
# Switch to workspace 8
bindsym $mod+underscore workspace number $ws8
# Switch to workspace 9
bindsym $mod+ccedilla workspace number $ws9
# Switch to workspace 10
bindsym $mod+agrave workspace number $ws10

# Move container to workspace 1
bindsym $mod+Shift+1 move container to workspace number $ws1
# Move container to workspace 2
bindsym $mod+Shift+eacute move container to workspace number $ws2
# Move container to workspace 3
bindsym $mod+Shift+3 move container to workspace number $ws3
# Move container to workspace 4
bindsym $mod+Shift+4 move container to workspace number $ws4
# Move container to workspace 5
bindsym $mod+Shift+5 move container to workspace number $ws5
# Move container to workspace 6
bindsym $mod+Shift+6 move container to workspace number $ws6
# Move container to workspace 7
bindsym $mod+Shift+egrave move container to workspace number $ws7
# Move container to workspace 8
bindsym $mod+Shift+8 move container to workspace number $ws8
# Move container to workspace 9
bindsym $mod+Shift+ccedilla move container to workspace number $ws9
# Move container to workspace 10
bindsym $mod+Shift+agrave move container to workspace number $ws10

# Move workspace to next output
bindsym $mod+x move workspace to output next

# App launcher
bindsym $mod+space exec "rofi -modi drun,run -show drun"

# Clipboard history
bindsym Mod1+v exec --no-startup-id rofi -no-config -modi "clipboard:greenclip print" -show clipboard

# Random guru quote
bindsym $mod+g exec --no-startup-id bash ~/.config/i3/scripts/guru.sh | xclip -selection clipboard

# Reload config
bindsym $mod+Shift+c reload
# Restart i3
bindsym $mod+Shift+r restart
